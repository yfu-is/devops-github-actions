name: Connect to OpenVPN
description: Connects to an OpenVPN network

inputs:
  username:
    required: true
  password:
    required: true
  config:
    required: true
  wait:
    required: false
    default: 30

runs:
  using: composite
  steps:
    - name: Install OpenVPN
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq openvpn

    - name: Connect to VPN
      shell: bash
      run: |
        echo "${{ inputs.config }}" > /tmp/vpn.ovpn
        echo -e "${{ inputs.username }}\n${{ inputs.password }}" > /tmp/auth.txt
        chmod 600 /tmp/vpn.ovpn /tmp/auth.txt
        
        sudo openvpn \
          --config /tmp/vpn.ovpn \
          --auth-user-pass /tmp/auth.txt \
          --daemon
        
        rm -f /tmp/vpn.ovpn /tmp/auth.txt

    - name: Waiting for VPN Connection
      shell: bash
      run: |
        timeout ${{ inputs.wait }} bash -c 'until ip link show type tun | grep -q tun; do sleep 1; done' || \
        { echo "VPN connection timed out"; exit 1; }